server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # AUTH_ORIGIN / IDP_ORIGINS placeholders are substituted at image build
  # time (see Dockerfile). Defaults: kbase.us, orcid.org.

  location = /healthz {
    access_log off;
    return 204;
  }

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/manifest+json
    application/wasm
    application/xml
    application/xml+rss
    image/svg+xml;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    # --- BEGIN security headers (keep in sync with location /) ---
    # `style-src 'unsafe-inline'` is deliberate: routes use inline `style=` attrs.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' __AUTH_ORIGIN__; form-action 'self' __AUTH_ORIGIN__ __IDP_ORIGINS__; frame-ancestors 'none'; base-uri 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    # --- END security headers ---
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache" always;
    # --- BEGIN security headers (keep in sync with location /assets/) ---
    # `style-src 'unsafe-inline'` is deliberate: routes use inline `style=` attrs.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' __AUTH_ORIGIN__; form-action 'self' __AUTH_ORIGIN__ __IDP_ORIGINS__; frame-ancestors 'none'; base-uri 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    # --- END security headers ---
    try_files $uri $uri/ /index.html;
  }
}
