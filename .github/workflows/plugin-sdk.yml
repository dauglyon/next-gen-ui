name: Plugin SDK package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: plugin-sdk-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build plugin-ui-sdk library
        run: npm run build:plugin-sdk

      - name: Pack tarball
        working-directory: dist-plugin-sdk
        run: npm pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-ui-sdk-tarball
          path: dist-plugin-sdk/*.tgz
          if-no-files-found: error

  publish:
    name: Publish to GitHub Packages npm
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'sdk-v')
    permissions:
      contents: write
      packages: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dauglyon'

      - run: npm ci

      - name: Derive package version from release tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^sdk-v(.+)$ ]]; then
            echo "Release tag '$RELEASE_TAG' is not of the form 'sdk-vX.Y.Z'." >&2
            exit 1
          fi
          echo "SDK_VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"

      - name: Build plugin-ui-sdk library
        run: npm run build:plugin-sdk

      - name: Pack tarball
        working-directory: dist-plugin-sdk
        run: npm pack

      - name: Publish to GitHub Packages npm
        working-directory: dist-plugin-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish "dauglyon-plugin-ui-sdk-${SDK_VERSION}.tgz"

      - name: Attach tarball to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" dist-plugin-sdk/*.tgz --clobber
