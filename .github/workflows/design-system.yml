name: Design system package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: design-system-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build design-system library
        run: npm run build:design-system

      - name: Pack tarball
        working-directory: dist-design-system
        run: npm pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-system-tarball
          path: dist-design-system/*.tgz
          if-no-files-found: error

  publish:
    name: Publish to GHCR npm
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'ds-v')
    permissions:
      contents: write
      packages: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dauglyon'

      - run: npm ci

      - name: Derive package version from release tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^ds-v(.+)$ ]]; then
            echo "Release tag '$RELEASE_TAG' is not of the form 'ds-vX.Y.Z'." >&2
            exit 1
          fi
          echo "DS_VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"

      - name: Build design-system library
        run: npm run build:design-system

      - name: Pack tarball
        working-directory: dist-design-system
        run: npm pack

      - name: Publish to GHCR npm
        working-directory: dist-design-system
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish "dauglyon-design-system-${DS_VERSION}.tgz"

      - name: Attach tarball to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" dist-design-system/*.tgz --clobber
