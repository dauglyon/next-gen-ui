name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build (also generates routeTree.gen.ts)
        run: npm run build

      - name: Verify routeTree.gen.ts is committed
        run: git diff --exit-code -- src/routeTree.gen.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
